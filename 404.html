<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <meta name="description" content="Page not found - Prizuri Hartadi's Portfolio">
    <!-- Redirect to index.html for client-side routing -->
    <meta http-equiv="refresh" content="0; url=/">
    <style>
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: #0a0a14;
        color: #ffffff;
        line-height: 1.6;
        text-align: center;
        padding: 60px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      .container {
        max-width: 500px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        background: linear-gradient(120deg, #ffffff 55%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        font-size: 1.2rem;
        color: #d1d1f0;
        margin-bottom: 30px;
      }
      a {
        display: inline-block;
        padding: 12px 28px;
        background: #a78bfa;
        color: #fff;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 600;
        transition: all 0.2s ease;
      }
      a:hover {
        background: #c4b5fd;
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(167,139,250,.35);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Halaman yang Anda cari tidak ditemukan.</p>
      <p>Page not found.</p>
      <p>Redirecting to homepage...</p>
      <a href="/">Kembali ke Beranda / Return to Home</a>
    </div>
    <script>
      // Immediate redirect for client-side routing
      window.location.href = '/';
    </script>
  </body>
</html>
